version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: airport-postgres
    environment:
      POSTGRES_DB: airportdb
      POSTGRES_USER: airport
      POSTGRES_PASSWORD: airport123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airport -d airportdb"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
