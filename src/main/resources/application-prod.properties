# ==========================================
# Perfil: prod — PostgreSQL en Docker
# Activar con: --spring.profiles.active=prod
# Requiere: docker compose up -d
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/airportdb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:airport}
spring.datasource.password=${DB_PASSWORD:airport123}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

# Deshabilitar SQL logs en producción
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
